server:
    port: 8100

spring:
    mongodb:
        host: ${MONGODB_HOST}
        port: ${MONGODB_PORT}
        database: ${MONGODB_DATABASE}
        username: ${MONGODB_USERNAME}
        password: ${MONGODB_PASSWORD}
        authentication-database: ${MONGODB_AUTH_DATABASE}
    data:
        mongodb:
            auto-index-creation: true
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT}
            database: ${REDIS_DATABASE}
